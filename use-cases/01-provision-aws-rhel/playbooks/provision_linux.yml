---
- name: Provision Linux
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - "{{ playbook_dir }}/../vars/vars.yml"

  vars:
    terraform_project_path: "{{ playbook_dir }}/../terraform"

  tasks:
    - name: Obter caminho do arquivo de backend do Terraform (se definido no AAP)
      ansible.builtin.set_fact:
        tf_backend_config_file: "{{ lookup('ansible.builtin.env', 'TF_BACKEND_CONFIG_FILE') | default('', true) }}"

    - name: Aplicar infraestrutura com Terraform (via cloud.terraform)
      cloud.terraform.terraform:
        project_path: "{{ terraform_project_path }}"
        state: present
        force_init: true
        backend_config_files: >-
          {{ tf_backend_config_file | length > 0
             | ternary([tf_backend_config_file], omit) }}
