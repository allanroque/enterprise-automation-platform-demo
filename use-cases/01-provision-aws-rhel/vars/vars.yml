---
# Valores padrão alinhados ao Terraform (finops-lab).
# Acesso às VMs: ssh -i aroque-key.pem ec2-user@<ip_publico>
# Para repassar ao Terraform via AAP, use Extra Vars no Job Template
# com os mesmos nomes: aws_region, instance_count, instance_types, key_name, ssh_public_key, tags_common.
aws_region: "us-east-2"
instance_count: 6
instance_types:
  - "t3.micro"
  - "t3.micro"
  - "t3.small"
  - "t3.small"
  - "t3.medium"
  - "t3.medium"
key_name: "aroque-key"
# Chave pública correspondente a aroque-key.pem (acesso SSH às instâncias)
ssh_public_key: "ssh-rsa "
tags_common:
  CostCenter: "1234"
  Environment: "finops-lab"
  Project: "ansible-demo"
  owner: "aroque"
  operating_system: "rhel"
